name: CI & Release

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # ── Linux & macOS ──────────────────────────
      - name: Install dependencies (Linux & macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x install-dependencies.sh
          ./install-dependencies.sh

      # ── Windows ────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: install-dependencies.bat
        shell: cmd

      - name: Build with Maven
        run: mvn --batch-mode package -P uberjar

      # Only upload the JAR from Linux to avoid triplicating the release asset
      - name: Upload JAR artifact
        if: success() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: maven-jar
          path: '**/target/*.jar'
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Read version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.get_version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download JAR artifact
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: maven-jar
          path: release-assets

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          body: |
            ## Release ${{ steps.get_version.outputs.tag }}

            Automatically generated from commit ${{ github.sha }}.

            ✅ Build passed on Linux, macOS, and Windows.

            **Triggered by:** `${{ github.actor }}`
            **Branch:** `${{ github.ref_name }}`
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, 'SNAPSHOT') }}
          files: release-assets/**/*.jar
